# agentd configuration
# Place at: ~/.config/agentd/config.yaml

# Default backend for new actors (pi | claude | codex)
default_backend: pi

# Channel adapters — launched and supervised by the daemon
# Built-in channels (telegram, cli) need no command.
# Custom channels specify a command.
# channels:
#   telegram:
#     spawn:                                    # optional defaults for actors from this channel
#       backend: pi
#       cwd: ~/.config/agentd/agents/telegram
#     env:
#       TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
#       TELEGRAM_ALLOWED_USERS: "123456"
#   my-custom:
#     command: ["python", "/path/to/adapter.py"]
#     enabled: false

# Optional HTTP inbox bridge for webhooks
# inbox_gateway:
#   enabled: true
#   host: 127.0.0.1
#   port: 8765
#   public_base_url: https://example.com/agentd  # if behind reverse proxy
